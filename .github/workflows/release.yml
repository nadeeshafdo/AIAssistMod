name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build multi-platform JAR (Desktop + Android)
        run: ./gradlew deploy

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/AIAssistMod.jar
          generate_release_notes: true
          make_latest: true
