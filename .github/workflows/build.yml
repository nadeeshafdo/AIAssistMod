name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew jar --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIAssistModDesktop
          path: build/libs/AIAssistModDesktop.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: AIAssistModDesktop

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: AIAssistModDesktop.jar
          generate_release_notes: true
